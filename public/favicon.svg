<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100">
  <defs>
    <mask id="windows">
      <rect x="0" y="0" width="120" height="100" fill="white" />
      <circle cx="30" cy="70" r="7" fill="black" />
      <circle cx="55" cy="70" r="7" fill="black" />
      <circle cx="80" cy="70" r="7" fill="black" />
    </mask>
  </defs>

  <g mask="url(#windows)" fill="#0f0f0f">
    <!-- Main Hull -->
    <ellipse cx="55" cy="70" rx="50" ry="25" />
    
    <!-- Top Hump -->
    <path d="M 35 48 C 45 35 65 35 75 48 Z" />
    
    <!-- Periscope Shaft -->
    <rect x="50" y="25" width="10" height="25" />
    
    <!-- Periscope Top Bend -->
    <path d="M 60 25 L 60 15 C 60 -5 42 5 42 5 L 42 18 C 50 18 50 25 50 25 Z" />
    
    <!-- Periscope Lip -->
    <rect x="39" y="3" width="5" height="18" rx="2" />
    
    <!-- Tail Fins -->
    <polygon points="80,55 110,40 100,70" />
    <polygon points="80,85 110,100 100,70" />
    
    <!-- Propeller Shaft -->
    <rect x="100" y="68" width="10" height="4" />
    
    <!-- Propeller Blades -->
    <path d="M 110 70 C 110 50 115 50 115 70 C 115 90 110 90 110 70 Z" />
  </g>
</svg>
